<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Login - CoreInventory</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="auth-container">
  <h1>Login</h1>
  <form id="loginForm">
    <label>Email</label>
    <input type="email" id="loginEmail" required>
    <div class="helper muted">We'll never share your email.</div>
    <label>Password</label>
    <div style="display:flex;gap:0.5rem;align-items:center;">
      <input type="password" id="loginPassword" required style="flex:1">
      <button type="button" id="loginShow" class="show-toggle">Show</button>
    </div>
    <div style="display:flex;align-items:center;gap:0.5rem;margin-top:0.5rem;">
      <label style="display:flex;align-items:center;gap:0.25rem;"><input type="checkbox" id="rememberMe"> Remember me</label>
      <a href="#" id="forgotLink" style="margin-left:auto;color:#98a1b3;text-decoration:none;font-size:0.9rem">Forgot?</a>
    </div>
    <div class="actions">
      <button type="submit" class="btn btn-primary">Sign in</button>
      <a class="btn btn-outline" href="signup.html">Sign up</a>
    </div>
  </form>
  <div id="loginMessage" class="mono"></div>
</div>

<script src="auth.js"></script>
<script>
// Prefill email if remembered
const remembered = localStorage.getItem('ci_remember_email');
if (remembered) document.getElementById('loginEmail').value = remembered;

document.getElementById('loginShow').addEventListener('click', ()=>{
  const pw = document.getElementById('loginPassword');
  const btn = document.getElementById('loginShow');
  if (pw.type === 'password') { pw.type = 'text'; btn.textContent = 'Hide'; }
  else { pw.type = 'password'; btn.textContent = 'Show'; }
});

document.getElementById('loginForm').addEventListener('submit', loginHandler);
</script>
</div>

<script src="auth.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', loginHandler);
</script>
</body>
</html>
